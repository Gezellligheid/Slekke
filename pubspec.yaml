name: slekke
description: "Slekke — internal communication tool, Slack/Discord clone."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.0
  firebase_storage: ^12.4.0
  firebase_messaging: ^15.2.5
  local_notifier: ^0.1.6
  google_sign_in: ^6.2.2

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # UI
  flutter_markdown: ^0.7.6
  emoji_picker_flutter: ^4.3.0
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  file_picker: ^8.1.7
  timeago: ^3.7.0
  google_fonts: ^6.2.1

  # Desktop OAuth (Windows Google Sign-In)
  flutter_web_auth_2: ^4.0.0
  http: ^1.6.0

  # Utils
  uuid: ^4.5.1
  intl: ^0.19.0
  shared_preferences: ^2.3.5
  url_launcher: ^6.3.1
  path: ^1.9.1

  cupertino_icons: ^1.0.8
  flutter_colorpicker: ^1.1.0
  audioplayers: ^6.7.0
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  json_serializable: ^6.9.5
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  image_path: "assets/images/slekke.png"
  android: true
  ios: true
  windows:
    generate: true
    image_path: "assets/images/slekke.png"
    icon_size: 48
  macos:
    generate: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/sounds/
